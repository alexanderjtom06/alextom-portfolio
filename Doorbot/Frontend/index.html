<html>
    <div class="login-container">
        <div style=" margin: 5% 5%; padding: 5% 25%; width: 40%; display: inline-block; border: 3px; border-radius: 15px; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);">
            <h2 style="text-align: center; font-size: larger; margin-bottom: 30px">
                Login
            </h2>
            <div style="text-align: center; margin-bottom: 15px;">
                <label for="username" style="display: block; margin-bottom: 5px;">Username:</label>
                <input type="text" id="username" name="username" style="width: 100%; padding: 1px;">
            </div>
            <div style="text-align: center; margin-bottom: 15px;">
                <label for="pass" style="display: block; margin-bottom: 5px;">Password: </label>
                <input type="password" id="pass" name="password" style="width: 100%; padding: 1px;">
            </div>
            <div style="display: flex; justify-content: center;">
                <input style="background-color: blue; color: white; text-align: center;" type type="submit" value="Login">
            </div>
        </div>
        
    </div>
</html>
